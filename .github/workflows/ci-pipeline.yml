name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test and coverage reports
        run: npm test

      - name: Require SONAR_TOKEN for Sonar scan
        if: ${{ env.SONAR_TOKEN == '' }}
        run: |
          echo "SONAR_TOKEN is not configured. Set the repository secret SONAR_TOKEN in GitHub."
          exit 1

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Upload test and coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-coverage-reports
          path: |
            reports/
            coverage/
          retention-days: 14
